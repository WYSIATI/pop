<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250">
  <style>text { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }</style>
  <rect width="760" height="250" rx="12" fill="#fafbfc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="40" font-size="18" font-weight="700" fill="#1a1a2e">Import Time</text>
  <text x="160" y="40" font-size="18" font-weight="400" fill="#94a3b8">cold start, 10 fresh subprocess runs</text>
  <text x="40" y="90" font-size="13" font-weight="700" fill="#FF6154">pop</text>
  <rect x="180" y="76" width="3" height="24" rx="2" fill="#FF6154"/>
  <text x="191" y="93" font-size="13" font-weight="700" fill="#FF6154">0.28 ms</text>
  <text x="40" y="140" font-size="13" font-weight="600" fill="#0284c7">smolagents</text>
  <rect x="180" y="126" width="320" height="24" rx="2" fill="#38bdf8"/>
  <text x="508" y="143" font-size="13" font-weight="600" fill="#0284c7">~740 ms</text>
  <text x="40" y="190" font-size="13" font-weight="600" fill="#64748b">LangChain</text>
  <rect x="180" y="176" width="520" height="24" rx="2" fill="#cbd5e1"/>
  <text x="708" y="193" font-size="13" font-weight="600" fill="#64748b">~1200 ms</text>
  <text x="40" y="235" font-size="11" font-weight="500" fill="#94a3b8">Measured in fresh subprocesses. pop uses lazy imports — only 2 deps load at import time.</text>
</svg>
