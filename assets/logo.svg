<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" width="280" height="90">
  <!-- pop logo: minimal wordmark with ripple mark -->

  <!-- Ripple mark: solid coral circle + expanding ring (like a pop!) -->
  <circle cx="28" cy="36" r="18" fill="none" stroke="#FF6154" stroke-width="2" opacity="0.3"/>
  <circle cx="28" cy="36" r="10" fill="#FF6154"/>

  <!-- "pop" wordmark -->
  <text x="60" y="55"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="52"
        font-weight="800"
        fill="#1a1a2e"
        letter-spacing="-1">pop</text>

  <!-- Tagline -->
  <text x="60" y="73"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="11"
        font-weight="400"
        fill="#94a3b8"
        letter-spacing="0.5">lightweight AI agents</text>
</svg>
